<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Virel</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      background-color: #07070e;
      background-image:
        radial-gradient(ellipse 90% 80% at 5% 5%,   rgba(109, 40, 217, 0.55) 0%, transparent 55%),
        radial-gradient(ellipse 80% 80% at 95% 95%,  rgba(29,  78, 216, 0.5)  0%, transparent 55%),
        radial-gradient(ellipse 60% 55% at 85% 10%,  rgba(219, 39, 119, 0.3)  0%, transparent 50%),
        radial-gradient(ellipse 55% 50% at 15% 90%,  rgba(16, 185, 129, 0.2)  0%, transparent 50%);
      animation: bg-shift 12s ease-in-out infinite alternate;
      color: #f0f0f0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    @keyframes bg-shift {
      0%   { background-size: 100% 100%, 100% 100%, 100% 100%, 100% 100%; }
      100% { background-size: 130% 130%, 120% 120%, 115% 115%, 125% 125%; }
    }

    .card {
      background: rgba(255, 255, 255, 0.04);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.09);
      border-radius: 24px;
      padding: 40px;
      max-width: 520px;
      width: 100%;
      box-shadow: 0 24px 64px rgba(0,0,0,0.7), 0 0 0 1px rgba(167,139,250,0.04);
      position: relative;
      z-index: 1;
    }

    /* ── START SCREEN ── */
    #start-screen { text-align: center; }

    .virel-wordmark {
      font-size: 0.85rem;
      font-weight: 800;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      background: linear-gradient(90deg, #a78bfa, #60a5fa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 44px;
    }

    .start-headline {
      font-size: 1.85rem;
      font-weight: 700;
      line-height: 1.25;
      margin-bottom: 16px;
      color: #f1f5f9;
    }

    .start-headline em {
      font-style: normal;
      background: linear-gradient(90deg, #a78bfa, #60a5fa, #f472b6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .start-sub {
      color: #94a3b8;
      font-size: 0.95rem;
      line-height: 1.65;
      margin-bottom: 32px;
    }

    .start-meta {
      display: flex;
      gap: 10px;
      justify-content: center;
      flex-wrap: wrap;
      margin-bottom: 36px;
    }

    .meta-pill {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.09);
      border-radius: 20px;
      padding: 6px 14px;
      font-size: 0.78rem;
      color: #94a3b8;
    }

    .btn {
      display: inline-block;
      padding: 14px 32px;
      border-radius: 50px;
      border: none;
      cursor: pointer;
      font-size: 0.97rem;
      font-weight: 600;
      transition: transform 0.15s, box-shadow 0.15s;
    }

    .btn:active { transform: scale(0.97); }

    .btn-primary {
      background: linear-gradient(135deg, #7c3aed, #2563eb);
      color: #fff;
      box-shadow: 0 4px 24px rgba(124, 58, 237, 0.4);
      width: 100%;
    }

    .btn-primary:hover { box-shadow: 0 6px 32px rgba(124, 58, 237, 0.65); }

    .btn-secondary {
      background: rgba(255,255,255,0.07);
      color: #e2e8f0;
      border: 1px solid rgba(255,255,255,0.13);
    }

    .btn-secondary:hover { background: rgba(255,255,255,0.12); }

    /* ── QUIZ SCREEN ── */
    #quiz-screen { display: none; }

    .quiz-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 32px;
    }

    .quiz-wordmark {
      font-size: 0.75rem;
      font-weight: 800;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      background: linear-gradient(90deg, #a78bfa, #60a5fa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .progress-dots { display: flex; gap: 7px; }

    .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: rgba(255,255,255,0.13);
      transition: background 0.3s, transform 0.3s;
    }

    .dot.done { background: rgba(167,139,250,0.35); }

    .dot.active {
      background: #a78bfa;
      transform: scale(1.35);
    }

    /* Question fade transition */
    .question-area {
      transition: opacity 0.22s ease, transform 0.22s ease;
    }

    .question-area.fade-out {
      opacity: 0;
      transform: translateY(-8px);
    }

    .question-num {
      font-size: 0.72rem;
      color: #a78bfa;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    .question-text {
      font-size: 1.18rem;
      font-weight: 600;
      margin-bottom: 22px;
      line-height: 1.52;
      color: #f1f5f9;
    }

    .choices { display: flex; flex-direction: column; gap: 9px; }

    .choice-btn {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.09);
      border-radius: 14px;
      padding: 13px 17px;
      color: #cbd5e1;
      font-size: 0.9rem;
      cursor: pointer;
      text-align: left;
      transition: background 0.14s, border-color 0.14s, transform 0.1s;
      line-height: 1.4;
    }

    .choice-btn:hover {
      background: rgba(124,58,237,0.16);
      border-color: rgba(124,58,237,0.45);
      transform: translateX(3px);
    }

    .choice-btn.selected {
      background: rgba(124,58,237,0.26);
      border-color: #a78bfa;
      color: #f1f5f9;
    }

    /* Reaction line — the key V2 feel */
    .reaction-wrap { min-height: 32px; margin: 14px 0 2px; }

    .reaction-text {
      font-size: 0.84rem;
      color: #a78bfa;
      font-style: italic;
      opacity: 0;
      transform: translateY(5px);
      transition: opacity 0.3s ease, transform 0.3s ease;
    }

    .reaction-text.visible {
      opacity: 1;
      transform: translateY(0);
    }

    .quiz-nav {
      display: flex;
      justify-content: flex-end;
      margin-top: 18px;
    }

    #next-btn {
      padding: 12px 26px;
      font-size: 0.92rem;
      width: auto;
      opacity: 0.35;
      pointer-events: none;
      transition: opacity 0.3s, box-shadow 0.3s;
    }

    #next-btn.ready {
      opacity: 1;
      pointer-events: auto;
    }

    /* ── LOADING SCREEN ── */
    #loading-screen { display: none; text-align: center; padding: 24px 0; }

    .loading-icon {
      font-size: 2.4rem;
      margin-bottom: 18px;
      animation: breathe 1.8s ease-in-out infinite;
    }

    @keyframes breathe {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.5; transform: scale(0.9); }
    }

    @media (prefers-reduced-motion: reduce) {
      body { animation: none; }
      .loading-icon { animation: none; }
      .question-area, .choice-btn, .btn, .trait-bar-fill,
      .results-reveal { transition: none; }
    }

    .loading-label {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.18em;
      color: #a78bfa;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .loading-text { color: #94a3b8; font-size: 0.9rem; }

    /* ── RESULTS SCREEN ── */
    #results-screen { display: none; }

    .result-eyebrow {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.18em;
      color: #94a3b8;
      text-align: center;
      margin-bottom: 16px;
    }

    /* The shareable card */
    .share-card {
      background: linear-gradient(135deg, rgba(124,58,237,0.22) 0%, rgba(37,99,235,0.18) 100%);
      border: 1px solid rgba(167,139,250,0.28);
      border-radius: 20px;
      padding: 28px 22px;
      text-align: center;
      margin-bottom: 22px;
    }

    .result-icon { font-size: 3rem; margin-bottom: 10px; }

    .result-name {
      font-size: 1.6rem;
      font-weight: 700;
      background: linear-gradient(90deg, #a78bfa, #60a5fa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 6px;
    }

    .result-tagline {
      color: #94a3b8;
      font-size: 0.88rem;
      font-style: italic;
    }

    /* Trait bars */
    .traits-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 22px;
    }

    .trait-bar-row { }

    .trait-bar-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 6px;
    }

    .trait-label {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.09em;
      color: #94a3b8;
      font-weight: 600;
    }

    .trait-bar-right {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .trait-value {
      font-size: 0.82rem;
      color: #c4b5fd;
      font-weight: 600;
    }

    .trait-pct {
      font-size: 0.75rem;
      color: #94a3b8;
      font-weight: 700;
      min-width: 30px;
      text-align: right;
    }

    .trait-bar-track {
      width: 100%;
      height: 6px;
      background: rgba(255,255,255,0.07);
      border-radius: 99px;
      overflow: hidden;
    }

    .trait-bar-fill {
      height: 100%;
      border-radius: 99px;
      background: linear-gradient(90deg, #7c3aed, #60a5fa);
      width: 0%;
      transition: width 1s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .section-label {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.13em;
      color: #94a3b8;
      margin-bottom: 10px;
    }

    /* "The Read" — the personal profile */
    .profile-text {
      line-height: 1.78;
      color: #e2e8f0;
      font-size: 0.93rem;
      background: rgba(0,0,0,0.22);
      border-radius: 14px;
      padding: 18px 20px;
      margin-bottom: 22px;
    }

    /* Compatibility */
    .compat-list { display: flex; flex-direction: column; gap: 9px; margin-bottom: 28px; }

    .compat-item {
      display: flex;
      align-items: center;
      gap: 12px;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 13px;
      padding: 12px 15px;
    }

    .compat-icon { font-size: 1.25rem; }
    .compat-info { flex: 1; }
    .compat-name { font-weight: 600; font-size: 0.88rem; color: #e2e8f0; }
    .compat-desc { color: #94a3b8; font-size: 0.78rem; margin-top: 2px; }
    .compat-score { font-size: 0.98rem; font-weight: 700; color: #a78bfa; }

    .results-footer { display: flex; gap: 10px; }

    .results-footer .btn {
      flex: 1;
      padding: 13px 18px;
      font-size: 0.88rem;
      text-align: center;
    }

    /* Context tags row on results */
    .context-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 16px;
    }

    .context-tag {
      display: inline-block;
      background: rgba(167,139,250,0.1);
      border: 1px solid rgba(167,139,250,0.22);
      color: #a78bfa;
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.05em;
      padding: 4px 10px;
      border-radius: 20px;
    }

    /* Compare CTA — shown when user is with friends */
    .compare-cta {
      background: linear-gradient(135deg, rgba(124,58,237,0.18), rgba(37,99,235,0.15));
      border: 1px solid rgba(167,139,250,0.3);
      border-radius: 14px;
      padding: 16px 18px;
      margin-bottom: 22px;
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .compare-cta-icon { font-size: 1.5rem; }

    .compare-cta-body { flex: 1; }

    .compare-cta-title {
      font-size: 0.9rem;
      font-weight: 700;
      color: #f1f5f9;
      margin-bottom: 3px;
    }

    .compare-cta-sub {
      font-size: 0.78rem;
      color: #94a3b8;
    }

    .compare-cta-btn {
      background: linear-gradient(135deg, #7c3aed, #2563eb);
      color: #fff;
      border: none;
      border-radius: 20px;
      padding: 8px 14px;
      font-size: 0.78rem;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
    }

    /* Results reveal animation */
    .results-reveal {
      opacity: 0;
      transform: translateY(10px);
      transition: opacity 0.4s ease, transform 0.4s ease;
    }
    .results-reveal.visible { opacity: 1; transform: translateY(0); }

    /* Share toast */
    #share-toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: rgba(124,58,237,0.95);
      color: #fff;
      padding: 12px 20px;
      border-radius: 50px;
      font-size: 0.88rem;
      font-weight: 600;
      opacity: 0;
      transition: opacity 0.3s, transform 0.3s;
      pointer-events: none;
      z-index: 100;
    }
    #share-toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body>
<div class="card">

  <!-- ══ START SCREEN ══ -->
  <div id="start-screen">
    <div class="virel-wordmark">Virel</div>
    <h1 class="start-headline">
      Find out who you <em>actually</em> are in friendships.
    </h1>
    <p class="start-sub">
      6 honest questions. Virel reads your personality and tells you
      exactly who you match with — and why.
    </p>
    <div class="start-meta">
      <div class="meta-pill">⚡ 2 minutes</div>
      <div class="meta-pill">📱 No signup</div>
      <div class="meta-pill">🎯 6 questions</div>
    </div>
    <button class="btn btn-primary" onclick="startQuiz()">Find My Type →</button>
  </div>

  <!-- ══ QUIZ SCREEN ══ -->
  <div id="quiz-screen">
    <div class="quiz-header">
      <div class="quiz-wordmark">Virel</div>
      <div class="progress-dots" id="progress-dots" aria-hidden="true"></div>
    </div>

    <div class="question-area" id="question-area">
      <div class="question-num" id="question-num"></div>
      <div class="question-text" id="question-text"></div>
      <div class="choices" id="choices-area"></div>
      <div class="reaction-wrap">
        <div class="reaction-text" id="reaction-text"></div>
      </div>
    </div>

    <div class="quiz-nav">
      <button class="btn btn-primary" id="next-btn" onclick="nextQuestion()">Next →</button>
    </div>
  </div>

  <!-- ══ LOADING SCREEN ══ -->
  <div id="loading-screen" tabindex="-1">
    <div class="loading-icon" aria-hidden="true">👁️</div>
    <div class="loading-label">Virel</div>
    <p class="loading-text" id="loading-text">Reading your patterns…</p>
  </div>

  <!-- ══ RESULTS SCREEN ══ -->
  <div id="results-screen">
    <div class="result-eyebrow" id="result-eyebrow">Your Virel type</div>
    <div class="context-tags" id="context-tags"></div>

    <div class="share-card results-reveal">
      <div class="result-icon" id="result-icon" aria-hidden="true"></div>
      <div class="result-name" id="result-name"></div>
      <div class="result-tagline" id="result-tagline"></div>
    </div>

    <div class="traits-list results-reveal" id="traits-list"></div>

    <div class="section-label">The Read</div>
    <div class="profile-text results-reveal" id="profile-text"></div>

    <div class="section-label">Who You Match With</div>
    <div class="compat-list results-reveal" id="compat-list"></div>

    <div id="compare-cta" class="results-reveal"></div>

    <div class="results-footer results-reveal">
      <button class="btn btn-secondary" onclick="restartQuiz()" aria-label="Retake quiz">↩ Retake</button>
      <button class="btn btn-primary" onclick="shareResult()">Share My Type</button>
    </div>
  </div>

  <div id="share-toast"></div>

</div>
<script>
// ─────────────────────────────────────────
//  QUESTIONS
//  All multiple choice. Open-ended deleted (K/C/D: DELETE).
//  Questions target 16-25, friendship/relationship context.
// ─────────────────────────────────────────
// ─────────────────────────────────────────
//  SETUP OPTIONS — question variants keyed by purpose
// ─────────────────────────────────────────
const Q3_VARIANTS = {

const Q5_VARIANTS = {

const PURPOSE_LABELS = {

const ENERGY_LABELS = {

const ENERGY_CONTEXT = {

];

const QUESTIONS = [
  {
    id: "q1",

    choices: [

    choices: [

  },
  {

    text: "Which sentence would make you feel the most seen?",
    choices: [
      '"I can tell when something\'s off with you even when you say you\'re fine." 🌙',

  {

    choices: [

// ─────────────────────────────────────────
//  MOCK SCORING WEIGHTS
//  Each array maps answer index → archetype index.
//  0=Observer, 1=SocialGlue, 2=Chaos, 3=Rock, 4=VibShifter
// ─────────────────────────────────────────
// 0=Observer, 1=SocialGlue, 2=Chaos, 3=Rock, 4=VibShifter
// Q1: notice-everything→Observer, make-happen→Chaos, feel-deeply→VibShifter, show-up→Rock, connect-fast→SocialGlue
// Q2: surface-convos→VibShifter, sitting-still→Chaos, explain-self→Observer, plan-changes→Rock, carrying-energy→SocialGlue
// Q3: no-time-passed→Observer, always-orbit→SocialGlue, go-deep→VibShifter, been-through-it→Rock, unlock-each-other→Chaos
// Q4: selective→Observer, not-loud→Rock, actually-care→VibShifter, dont-ask→Chaos, hard-to-read→SocialGlue
// Q5: consistent→Rock, real→Observer, lighter→Chaos, push-better→VibShifter, truly-get-you→SocialGlue
// Q6: remember-details→Observer, show-up→Rock, say-it→Chaos, make-time→SocialGlue, match-energy→VibShifter
const WEIGHTS = {
  q1: [0, 2, 4, 3, 1],
  q2: [4, 2, 0, 3, 1],
  q3: [0, 1, 4, 3, 2],
  q4: [0, 3, 4, 2, 1],
  q5: [3, 0, 2, 4, 1],
  q6: [0, 3, 2, 1, 4],
  q7: [0, 4, 2, 3, 0],
  q8: [0, 4, 3, 1, 0]
};

// ─────────────────────────────────────────
//  STATE
// ─────────────────────────────────────────
let currentQ    = 0;
let answers     = {};
let activeQuestions = [];
let userContext = { purpose: null, energy: null, time: null, social: null };
let apiErrorUsed = false;
const apiKey    = "__OPENROUTER_API_KEY__";

// ─────────────────────────────────────────
//  SCREEN HELPERS
// ─────────────────────────────────────────
function showScreen(id) {
  ["start-screen","quiz-screen","loading-screen","results-screen"]
    .forEach(s => { document.getElementById(s).style.display = "none"; });
  const target = document.getElementById(id);
  target.style.display = "block";
  const focusable = target.querySelector("button, [tabindex]");
  if (focusable) focusable.focus();
}

// ─────────────────────────────────────────
//  QUIZ START
// ─────────────────────────────────────────
function startQuiz() {
  userContext = { purpose: null, energy: null, time: "quick", social: null };
  answers = {};
  currentQ = 0;
  activeQuestions = [...QUESTIONS];
  localStorage.removeItem("virel_result");
  showScreen("quiz-screen");
  buildDots();
  renderQuestion();
  document.addEventListener("keydown", handleQuizKey);
}

// ─────────────────────────────────────────
//  QUIZ FLOW
// ─────────────────────────────────────────

function buildDots() {
  const wrap = document.getElementById("progress-dots");
  wrap.innerHTML = "";
  activeQuestions.forEach((_, i) => {
    const d = document.createElement("div");
    d.className = "dot";
    d.id = `dot-${i}`;
    wrap.appendChild(d);
  });
}

function updateDots() {
  activeQuestions.forEach((_, i) => {
    const d = document.getElementById(`dot-${i}`);
    d.className = "dot" + (i < currentQ ? " done" : i === currentQ ? " active" : "");
  });
}

function renderQuestion() {
  const q = activeQuestions[currentQ];
  updateDots();

  document.getElementById("question-area").classList.remove("fade-out");
  document.getElementById("question-num").textContent = `Question ${currentQ + 1} of ${activeQuestions.length}`;

  // Apply context-aware variant if one exists for this question
  let questionText = q.text;
  if (q.id === "q3" && userContext.purpose) questionText = Q3_VARIANTS[userContext.purpose];
  if (q.id === "q5" && userContext.purpose) questionText = Q5_VARIANTS[userContext.purpose];
  document.getElementById("question-text").textContent = questionText;

  const area = document.getElementById("choices-area");
  area.innerHTML = "";
  q.choices.forEach((text, i) => {
    const btn = document.createElement("button");
    btn.className = "choice-btn" + (answers[q.id] === i ? " selected" : "");
    btn.textContent = text;
    btn.onclick = () => selectAnswer(i);
    area.appendChild(btn);
  });

  // Reset reaction + next button
  const reactionEl = document.getElementById("reaction-text");
  reactionEl.textContent = "";
  reactionEl.classList.remove("visible");

  const isLast = currentQ === activeQuestions.length - 1;
  const nextBtn = document.getElementById("next-btn");
  nextBtn.classList.remove("ready");
  nextBtn.textContent = isLast ? "See My Type ✨" : "Next →";
  if (isLast) nextBtn.setAttribute("aria-label", "See my personality type");
  else nextBtn.removeAttribute("aria-label");

  // Restore state if revisiting
  if (answers[q.id] !== undefined) {
    reactionEl.textContent = q.reactions[answers[q.id]];
    reactionEl.classList.add("visible");
    nextBtn.classList.add("ready");
  }

  // Move focus to first choice for keyboard users
  const firstChoice = area.querySelector(".choice-btn");
  if (firstChoice) firstChoice.focus();
}

function selectAnswer(index) {
  const q = activeQuestions[currentQ];
  answers[q.id] = index;

  document.querySelectorAll(".choice-btn").forEach((btn, i) => {
    btn.classList.toggle("selected", i === index);
  });

  // Show reaction — the V2 "AI noticed you" moment
  const reactionEl = document.getElementById("reaction-text");
  reactionEl.textContent = q.reactions[index];
  reactionEl.classList.add("visible");

  document.getElementById("next-btn").classList.add("ready");
}

function handleQuizKey(e) {
  const idx = parseInt(e.key) - 1;
  const choices = document.querySelectorAll(".choice-btn");
  if (idx >= 0 && idx < choices.length) { selectAnswer(idx); return; }
  if ((e.key === "Enter" || e.key === " ") &&
      document.getElementById("next-btn").classList.contains("ready")) {
    e.preventDefault();
    nextQuestion();
  }
}

function nextQuestion() {
  if (answers[activeQuestions[currentQ].id] === undefined) return;

  if (currentQ < activeQuestions.length - 1) {
    const area = document.getElementById("question-area");
    area.classList.add("fade-out");
    setTimeout(() => { currentQ++; renderQuestion(); }, 230);
  } else {
    analyseAnswers();
  }
}

// ─────────────────────────────────────────
//  ANALYSIS
// ─────────────────────────────────────────
async function analyseAnswers() {
  document.removeEventListener("keydown", handleQuizKey);
  showScreen("loading-screen");

  const messages = userContext.time === "quick"
    ? ["Reading your patterns…", "Almost there…"]
    : ["Reading your patterns…", "Cross-referencing your answers…", "Building your profile…", "Almost there…"];
  let mi = 0;
  const lt = document.getElementById("loading-text");
  const ticker = setInterval(() => { lt.textContent = messages[++mi % messages.length]; }, 1100);

  let result;
  try {
    result = (apiKey && apiKey !== "__OPENROUTER_API_KEY__")
      ? await callOpenRouter()
      : (await sleep(2400), mockAnalysis());
  } catch(e) {
    console.warn("API error, falling back to mock:", e);
    result = mockAnalysis();
    apiErrorUsed = true;
  }

  clearInterval(ticker);
  lt.textContent = "";
  displayResults(result);
}

const sleep = ms => new Promise(r => setTimeout(r, ms));

// ─────────────────────────────────────────
//  OPENROUTER CALL
//  System prompt written in Virel voice — specific, personal, bold.
// ─────────────────────────────────────────
async function callOpenRouter() {
  const summary = activeQuestions.map((q, i) => {
    const chosen = q.choices[answers[q.id]] || "no answer";
    return `Q${i+1}: ${q.text}\nAnswer: ${chosen}`;
  }).join("\n\n");

  const systemPrompt = `You are Virel — an AI that reads personality through friendship patterns.

Analyze the user's quiz answers and write a personality profile that feels uncomfortably specific, like you've been watching them for months. Use bold, direct language. Never write generic lines like "you are thoughtful and creative." Write lines like "You don't open up fast, but when you do, it sticks."

The quiz is about friendships and social connection for users aged 16–25. Every answer reveals how they navigate relationships, conflict, and closeness.

Return ONLY valid JSON — no markdown, no text outside the JSON:
{
  "name": "The [Personality Type — 2-3 words, memorable]",
  "icon": "[single emoji that fits their personality]",
  "tagline": "[under 10 words — specific, slightly edgy, reads like a one-liner about them]",
  "traits": [
    {"label": "Social Style", "value": "[1-3 word descriptor]"},
    {"label": "Energy",       "value": "[1-3 word descriptor]"},
    {"label": "Reads People", "value": "[1-3 word descriptor]"},
    {"label": "Friendship",   "value": "[1-3 word descriptor]"}
  ],
  "profile": "[2-3 sentences. Write like you know their private thoughts. Use 'you' not 'they'. Call out their actual patterns. Make them think: 'wait, how did it know that?' No compliment-speak — be honest, bold, real.]",
  "matches": [
    {"icon": "[emoji]", "name": "The [Personality Type]", "desc": "[why you two work — under 8 words, specific]", "score": "[XX%]"},
    {"icon": "[emoji]", "name": "The [Personality Type]", "desc": "[why you two work — under 8 words, specific]", "score": "[XX%]"},
    {"icon": "[emoji]", "name": "The [Personality Type]", "desc": "[why you two work — under 8 words, specific]", "score": "[XX%]"}
  ]
}`;

  const resp = await fetch("https://openrouter.ai/api/v1/chat/completions", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "Authorization": `Bearer ${apiKey}`,
      "HTTP-Referer": window.location.href,
      "X-Title": "Virel"
    },
    body: JSON.stringify({
      model: "openai/gpt-4o-mini",
      messages: [
        { role: "system", content: systemPrompt },
        { role: "user",   content: summary }
      ],
      temperature: 0.9
    })
  });

  if (!resp.ok) throw new Error(`API ${resp.status}`);
  return JSON.parse((await resp.json()).choices[0].message.content);
}

// ─────────────────────────────────────────
//  MOCK ANALYSIS
//  Scores answers against weights to pick best-fit archetype.
//  Different answer combos produce different results.
// ─────────────────────────────────────────
function mockAnalysis() {
  const scores = [0, 0, 0, 0, 0];
  for (const [qid, map] of Object.entries(WEIGHTS)) {
    const ans = answers[qid];
    if (ans !== undefined) scores[map[ans]]++;
  }
  return ARCHETYPES[scores.indexOf(Math.max(...scores))];
}

// ─────────────────────────────────────────
//  DISPLAY RESULTS
// ─────────────────────────────────────────
function displayResults(r) {
  // Reset reveal classes so animation re-triggers every time
  document.querySelectorAll(".results-reveal").forEach(el => el.classList.remove("visible"));

  // Reset trait bars to 0 so fill animation always plays
  document.querySelectorAll(".trait-bar-fill").forEach(bar => {
    bar.style.transition = "none";
    bar.style.width = "0%";
  });

  // Identity fields — visible immediately
  document.getElementById("result-icon").textContent    = r.icon;
  document.getElementById("result-name").textContent    = r.name;
  document.getElementById("result-tagline").textContent = r.tagline;

  if (apiErrorUsed) {
    document.getElementById("result-eyebrow").textContent = "Your Virel type · Demo mode";
    apiErrorUsed = false;
  } else {
    document.getElementById("result-eyebrow").textContent = "Your Virel type";
  }

  // Context tags
  const tags = [];
  if (userContext.purpose) tags.push(PURPOSE_LABELS[userContext.purpose]);
  if (userContext.energy)  tags.push(ENERGY_LABELS[userContext.energy]);
  if (userContext.time === "quick") tags.push("Quick mode ⚡");
  if (userContext.time === "full")  tags.push("Full read 🌙");
  document.getElementById("context-tags").innerHTML =
    tags.map(t => `<div class="context-tag">${t}</div>`).join("");

  // Prepend energy context note to profile
  const energyNote = userContext.energy ? ENERGY_CONTEXT[userContext.energy] + " " : "";
  document.getElementById("profile-text").textContent = energyNote + r.profile;

  // Compare CTA
  const compareCta = document.getElementById("compare-cta");
  if (userContext.social === "friends") {
    compareCta.innerHTML = `
      <div class="compare-cta">
        <div class="compare-cta-icon">👥</div>
        <div class="compare-cta-body">
          <div class="compare-cta-title">Compare with them</div>
          <div class="compare-cta-sub">Send them the link and compare your types</div>
        </div>
        <button class="compare-cta-btn" onclick="shareResult()">Send →</button>
      </div>`;
  } else if (userContext.social === "send") {
    compareCta.innerHTML = `
      <div class="compare-cta">
        <div class="compare-cta-icon">📲</div>
        <div class="compare-cta-body">
          <div class="compare-cta-title">Send it now</div>
          <div class="compare-cta-sub">See if they agree with your result</div>
        </div>
        <button class="compare-cta-btn" onclick="shareResult()">Share →</button>
      </div>`;
  } else {
    compareCta.innerHTML = "";
  }

  // Render trait bars
  document.getElementById("traits-list").innerHTML = r.traits.map(t => `
    <div class="trait-bar-row">
      <div class="trait-bar-header">
        <span class="trait-label">${t.label}</span>
        <div class="trait-bar-right">
          <span class="trait-value">${t.value}</span>
          <span class="trait-pct">${t.pct}%</span>
        </div>
      </div>
      <div class="trait-bar-track">
        <div class="trait-bar-fill" data-pct="${t.pct}"></div>
      </div>
    </div>`).join("");

  document.getElementById("compat-list").innerHTML = r.matches.map(m => `
    <div class="compat-item">
      <div class="compat-icon">${m.icon}</div>
      <div class="compat-info">
        <div class="compat-name">${m.name}</div>
        <div class="compat-desc">${m.desc}</div>
      </div>
      <div class="compat-score">${m.score}</div>
    </div>`).join("");

  showScreen("results-screen");

  // Staggered section reveals
  const reveal = sel => document.querySelector(sel)?.classList.add("visible");
  setTimeout(() => reveal(".share-card"),       300);
  setTimeout(() => {
    reveal("#traits-list");
    // Animate bars after reveal paint
    requestAnimationFrame(() => requestAnimationFrame(() => {
      document.querySelectorAll(".trait-bar-fill").forEach(bar => {
        bar.style.transition = "";
        bar.style.width = bar.dataset.pct + "%";
      });
    }));
  }, 600);
  setTimeout(() => reveal("#profile-text"),     900);
  setTimeout(() => reveal("#compat-list"),      1100);
  setTimeout(() => { reveal("#compare-cta"); reveal(".results-footer"); }, 1300);

  saveResult(r);
}

// ─────────────────────────────────────────
//  UTILITIES
// ─────────────────────────────────────────
function restartQuiz() { startQuiz(); }

function saveResult(result) {
  try {
    localStorage.setItem("virel_result", JSON.stringify({ result, context: userContext, ts: Date.now() }));
  } catch(e) {}
}

function loadResult() {
  try {
    const raw = localStorage.getItem("virel_result");
    if (!raw) return null;
    const d = JSON.parse(raw);
    if (Date.now() - d.ts > 7 * 86400000) { localStorage.removeItem("virel_result"); return null; }
    return d;
  } catch(e) { return null; }
}

function showToast(msg) {
  const toast = document.getElementById("share-toast");
  toast.textContent = msg;
  toast.classList.add("show");
  setTimeout(() => toast.classList.remove("show"), 2200);
}

function shareResult() {
  const name    = document.getElementById("result-name").textContent;
  const tagline = document.getElementById("result-tagline").textContent;
  const text    = `My Virel type: ${name}\n"${tagline}"\n\nFind out yours →`;
  if (navigator.share) {
    navigator.share({ title: "Virel", text });
  } else if (navigator.clipboard) {
    navigator.clipboard.writeText(text).then(() => showToast("Copied to clipboard!"));
  } else {
    showToast(text);
  }
}

// On page load: restore cached result if fresh (< 7 days)
(function() {
  const cached = loadResult();
  if (cached) {
    userContext = cached.context;
    displayResults(cached.result);
  }
})();
