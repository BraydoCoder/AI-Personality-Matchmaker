<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Virel</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      background: #09090f;
      color: #f0f0f0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .card {
      background: rgba(255, 255, 255, 0.04);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.09);
      border-radius: 24px;
      padding: 40px;
      max-width: 520px;
      width: 100%;
      box-shadow: 0 24px 64px rgba(0,0,0,0.7), 0 0 0 1px rgba(167,139,250,0.04);
    }

    /* ── START SCREEN ── */
    #start-screen { text-align: center; }

    .virel-wordmark {
      font-size: 0.85rem;
      font-weight: 800;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      background: linear-gradient(90deg, #a78bfa, #60a5fa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 44px;
    }

    .start-headline {
      font-size: 1.85rem;
      font-weight: 700;
      line-height: 1.25;
      margin-bottom: 16px;
      color: #f1f5f9;
    }

    .start-headline em {
      font-style: normal;
      background: linear-gradient(90deg, #a78bfa, #60a5fa, #f472b6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .start-sub {
      color: #94a3b8;
      font-size: 0.95rem;
      line-height: 1.65;
      margin-bottom: 32px;
    }

    .start-meta {
      display: flex;
      gap: 10px;
      justify-content: center;
      flex-wrap: wrap;
      margin-bottom: 36px;
    }

    .meta-pill {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.09);
      border-radius: 20px;
      padding: 6px 14px;
      font-size: 0.78rem;
      color: #94a3b8;
    }

    .btn {
      display: inline-block;
      padding: 14px 32px;
      border-radius: 50px;
      border: none;
      cursor: pointer;
      font-size: 0.97rem;
      font-weight: 600;
      transition: transform 0.15s, box-shadow 0.15s;
    }

    .btn:active { transform: scale(0.97); }

    .btn-primary {
      background: linear-gradient(135deg, #7c3aed, #2563eb);
      color: #fff;
      box-shadow: 0 4px 24px rgba(124, 58, 237, 0.4);
      width: 100%;
    }

    .btn-primary:hover { box-shadow: 0 6px 32px rgba(124, 58, 237, 0.65); }

    .btn-secondary {
      background: rgba(255,255,255,0.07);
      color: #e2e8f0;
      border: 1px solid rgba(255,255,255,0.13);
    }

    .btn-secondary:hover { background: rgba(255,255,255,0.12); }

    /* ── QUIZ SCREEN ── */
    #quiz-screen { display: none; }

    .quiz-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 32px;
    }

    .quiz-wordmark {
      font-size: 0.75rem;
      font-weight: 800;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      background: linear-gradient(90deg, #a78bfa, #60a5fa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .progress-dots { display: flex; gap: 7px; }

    .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: rgba(255,255,255,0.13);
      transition: background 0.3s, transform 0.3s;
    }

    .dot.done { background: rgba(167,139,250,0.35); }

    .dot.active {
      background: #a78bfa;
      transform: scale(1.35);
    }

    /* Question fade transition */
    .question-area {
      transition: opacity 0.22s ease, transform 0.22s ease;
    }

    .question-area.fade-out {
      opacity: 0;
      transform: translateY(-8px);
    }

    .question-num {
      font-size: 0.72rem;
      color: #a78bfa;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    .question-text {
      font-size: 1.18rem;
      font-weight: 600;
      margin-bottom: 22px;
      line-height: 1.52;
      color: #f1f5f9;
    }

    .choices { display: flex; flex-direction: column; gap: 9px; }

    .choice-btn {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.09);
      border-radius: 14px;
      padding: 13px 17px;
      color: #cbd5e1;
      font-size: 0.9rem;
      cursor: pointer;
      text-align: left;
      transition: background 0.14s, border-color 0.14s, transform 0.1s;
      line-height: 1.4;
    }

    .choice-btn:hover {
      background: rgba(124,58,237,0.16);
      border-color: rgba(124,58,237,0.45);
      transform: translateX(3px);
    }

    .choice-btn.selected {
      background: rgba(124,58,237,0.26);
      border-color: #a78bfa;
      color: #f1f5f9;
    }

    /* Reaction line — the key V2 feel */
    .reaction-wrap { min-height: 32px; margin: 14px 0 2px; }

    .reaction-text {
      font-size: 0.84rem;
      color: #a78bfa;
      font-style: italic;
      opacity: 0;
      transform: translateY(5px);
      transition: opacity 0.3s ease, transform 0.3s ease;
    }

    .reaction-text.visible {
      opacity: 1;
      transform: translateY(0);
    }

    .quiz-nav {
      display: flex;
      justify-content: flex-end;
      margin-top: 18px;
    }

    #next-btn {
      padding: 12px 26px;
      font-size: 0.92rem;
      width: auto;
      opacity: 0.35;
      pointer-events: none;
      transition: opacity 0.3s, box-shadow 0.3s;
    }

    #next-btn.ready {
      opacity: 1;
      pointer-events: auto;
    }

    /* ── LOADING SCREEN ── */
    #loading-screen { display: none; text-align: center; padding: 24px 0; }

    .loading-icon {
      font-size: 2.4rem;
      margin-bottom: 18px;
      animation: breathe 1.8s ease-in-out infinite;
    }

    @keyframes breathe {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.5; transform: scale(0.9); }
    }

    .loading-label {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.18em;
      color: #a78bfa;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .loading-text { color: #64748b; font-size: 0.9rem; }

    /* ── RESULTS SCREEN ── */
    #results-screen { display: none; }

    .result-eyebrow {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.18em;
      color: #475569;
      text-align: center;
      margin-bottom: 16px;
    }

    /* The shareable card */
    .share-card {
      background: linear-gradient(135deg, rgba(124,58,237,0.22) 0%, rgba(37,99,235,0.18) 100%);
      border: 1px solid rgba(167,139,250,0.28);
      border-radius: 20px;
      padding: 28px 22px;
      text-align: center;
      margin-bottom: 22px;
    }

    .result-icon { font-size: 3rem; margin-bottom: 10px; }

    .result-name {
      font-size: 1.6rem;
      font-weight: 700;
      background: linear-gradient(90deg, #a78bfa, #60a5fa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 6px;
    }

    .result-tagline {
      color: #94a3b8;
      font-size: 0.88rem;
      font-style: italic;
    }

    /* Trait chips */
    .traits-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 9px;
      margin-bottom: 22px;
    }

    .trait-chip {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 12px;
      padding: 10px 13px;
    }

    .trait-label {
      color: #475569;
      font-size: 0.68rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 3px;
    }

    .trait-value {
      font-weight: 600;
      font-size: 0.86rem;
      color: #c4b5fd;
    }

    .section-label {
      font-size: 0.68rem;
      text-transform: uppercase;
      letter-spacing: 0.13em;
      color: #475569;
      margin-bottom: 10px;
    }

    /* "The Read" — the personal profile */
    .profile-text {
      line-height: 1.78;
      color: #e2e8f0;
      font-size: 0.93rem;
      background: rgba(0,0,0,0.22);
      border-radius: 14px;
      padding: 18px 20px;
      margin-bottom: 22px;
    }

    /* Compatibility */
    .compat-list { display: flex; flex-direction: column; gap: 9px; margin-bottom: 28px; }

    .compat-item {
      display: flex;
      align-items: center;
      gap: 12px;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 13px;
      padding: 12px 15px;
    }

    .compat-icon { font-size: 1.25rem; }
    .compat-info { flex: 1; }
    .compat-name { font-weight: 600; font-size: 0.88rem; color: #e2e8f0; }
    .compat-desc { color: #64748b; font-size: 0.78rem; margin-top: 2px; }
    .compat-score { font-size: 0.98rem; font-weight: 700; color: #a78bfa; }

    .results-footer { display: flex; gap: 10px; }

    .results-footer .btn {
      flex: 1;
      padding: 13px 18px;
      font-size: 0.88rem;
      text-align: center;
    }
  </style>
</head>
<body>
<div class="card">

  <!-- ══ START SCREEN ══ -->

      <button class="btn btn-secondary" onclick="restartQuiz()">↩ Retake</button>
      <button class="btn btn-primary" onclick="shareResult()">Share My Type</button>

</div>

// ─────────────────────────────────────────
//  MOCK SCORING WEIGHTS
//  Each array maps answer index → archetype index.
//  0=Observer, 1=SocialGlue, 2=Chaos, 3=Rock, 4=VibShifter
// ─────────────────────────────────────────
const WEIGHTS = {
  q1: [0, 4, 1, 2, 3],
  q2: [2, 1, 0, 4, 3],
  q3: [2, 4, 1, 0, 3],
  q4: [0, 1, 2, 3, 4],
  q5: [4, 3, 2, 0, 1],
  q6: [3, 2, 4, 1, 0]
};

// ─────────────────────────────────────────
//  STATE
// ─────────────────────────────────────────
let currentQ = 0;
let answers  = {};
const apiKey = "__OPENROUTER_API_KEY__";

// ─────────────────────────────────────────
//  SCREEN HELPERS
// ─────────────────────────────────────────
function showScreen(id) {
  ["start-screen","quiz-screen","loading-screen","results-screen"]
    .forEach(s => { document.getElementById(s).style.display = "none"; });
  document.getElementById(id).style.display = "block";
}

// ─────────────────────────────────────────
//  QUIZ FLOW
// ─────────────────────────────────────────
function startQuiz() {
  currentQ = 0;
  answers  = {};
  showScreen("quiz-screen");
  buildDots();
  renderQuestion();
}

function buildDots() {
  const wrap = document.getElementById("progress-dots");
  wrap.innerHTML = "";
  QUESTIONS.forEach((_, i) => {
    const d = document.createElement("div");
    d.className = "dot";
    d.id = `dot-${i}`;
    wrap.appendChild(d);
  });
}

function updateDots() {
  QUESTIONS.forEach((_, i) => {
    const d = document.getElementById(`dot-${i}`);
    d.className = "dot" + (i < currentQ ? " done" : i === currentQ ? " active" : "");
  });
}

function renderQuestion() {
  const q = QUESTIONS[currentQ];
  updateDots();

  document.getElementById("question-area").classList.remove("fade-out");
  document.getElementById("question-num").textContent = `Question ${currentQ + 1} of ${QUESTIONS.length}`;
  document.getElementById("question-text").textContent = q.text;

  const area = document.getElementById("choices-area");
  area.innerHTML = "";
  q.choices.forEach((text, i) => {
    const btn = document.createElement("button");
    btn.className = "choice-btn" + (answers[q.id] === i ? " selected" : "");
    btn.textContent = text;
    btn.onclick = () => selectAnswer(i);
    area.appendChild(btn);
  });

  // Reset reaction + next button
  const reactionEl = document.getElementById("reaction-text");
  reactionEl.textContent = "";
  reactionEl.classList.remove("visible");

  const nextBtn = document.getElementById("next-btn");
  nextBtn.classList.remove("ready");
  nextBtn.textContent = currentQ === QUESTIONS.length - 1 ? "See My Type ✨" : "Next →";

  // Restore state if revisiting
  if (answers[q.id] !== undefined) {
    reactionEl.textContent = q.reactions[answers[q.id]];
    reactionEl.classList.add("visible");
    nextBtn.classList.add("ready");
  }
}

function selectAnswer(index) {
  const q = QUESTIONS[currentQ];
  answers[q.id] = index;

  document.querySelectorAll(".choice-btn").forEach((btn, i) => {
    btn.classList.toggle("selected", i === index);
  });

  // Show reaction — the V2 "AI noticed you" moment
  const reactionEl = document.getElementById("reaction-text");
  reactionEl.textContent = q.reactions[index];
  reactionEl.classList.add("visible");

  document.getElementById("next-btn").classList.add("ready");
}

function nextQuestion() {
  if (answers[QUESTIONS[currentQ].id] === undefined) return;

  if (currentQ < QUESTIONS.length - 1) {
    const area = document.getElementById("question-area");
    area.classList.add("fade-out");
    setTimeout(() => { currentQ++; renderQuestion(); }, 230);
  } else {
    analyseAnswers();
  }
}

// ─────────────────────────────────────────
//  ANALYSIS
// ─────────────────────────────────────────
async function analyseAnswers() {
  showScreen("loading-screen");

  const messages = [
    "Reading your patterns…",
    "Cross-referencing your answers…",
    "Building your profile…",
    "Almost there…"
  ];
  let mi = 0;
  const lt = document.getElementById("loading-text");
  const ticker = setInterval(() => { lt.textContent = messages[++mi % messages.length]; }, 1100);

  let result;
  try {
    result = (apiKey && apiKey !== "__OPENROUTER_API_KEY__")
      ? await callOpenRouter()
      : (await sleep(2400), mockAnalysis());
  } catch(e) {
    console.warn("API error, falling back to mock:", e);
    result = mockAnalysis();
  }

  clearInterval(ticker);
  displayResults(result);
}

const sleep = ms => new Promise(r => setTimeout(r, ms));

// ─────────────────────────────────────────
//  OPENROUTER CALL
//  System prompt written in Virel voice — specific, personal, bold.
// ─────────────────────────────────────────
async function callOpenRouter() {
  const summary = QUESTIONS.map((q, i) => {
    const chosen = q.choices[answers[q.id]] || "no answer";
    return `Q${i+1}: ${q.text}\nAnswer: ${chosen}`;
  }).join("\n\n");

  const systemPrompt = `You are Virel — an AI that reads personality through friendship patterns.

Analyze the user's quiz answers and write a personality profile that feels uncomfortably specific, like you've been watching them for months. Use bold, direct language. Never write generic lines like "you are thoughtful and creative." Write lines like "You don't open up fast, but when you do, it sticks."

The quiz is about friendships and social connection for users aged 16–25. Every answer reveals how they navigate relationships, conflict, and closeness.

Return ONLY valid JSON — no markdown, no text outside the JSON:
{
  "name": "The [Personality Type — 2-3 words, memorable]",
  "icon": "[single emoji that fits their personality]",
  "tagline": "[under 10 words — specific, slightly edgy, reads like a one-liner about them]",
  "traits": [
    {"label": "Social Style", "value": "[1-3 word descriptor]"},
    {"label": "Energy",       "value": "[1-3 word descriptor]"},
    {"label": "Reads People", "value": "[1-3 word descriptor]"},
    {"label": "Friendship",   "value": "[1-3 word descriptor]"}
  ],
  "profile": "[2-3 sentences. Write like you know their private thoughts. Use 'you' not 'they'. Call out their actual patterns. Make them think: 'wait, how did it know that?' No compliment-speak — be honest, bold, real.]",
  "matches": [
    {"icon": "[emoji]", "name": "The [Personality Type]", "desc": "[why you two work — under 8 words, specific]", "score": "[XX%]"},
    {"icon": "[emoji]", "name": "The [Personality Type]", "desc": "[why you two work — under 8 words, specific]", "score": "[XX%]"},
    {"icon": "[emoji]", "name": "The [Personality Type]", "desc": "[why you two work — under 8 words, specific]", "score": "[XX%]"}
  ]
}`;

  const resp = await fetch("https://openrouter.ai/api/v1/chat/completions", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "Authorization": `Bearer ${apiKey}`,
      "HTTP-Referer": window.location.href,
      "X-Title": "Virel"
    },
    body: JSON.stringify({
      model: "openai/gpt-4o-mini",
      messages: [
        { role: "system", content: systemPrompt },
        { role: "user",   content: summary }
      ],
      temperature: 0.9
    })
  });

  if (!resp.ok) throw new Error(`API ${resp.status}`);
  return JSON.parse((await resp.json()).choices[0].message.content);
}

// ─────────────────────────────────────────
//  MOCK ANALYSIS
//  Scores answers against weights to pick best-fit archetype.
//  Different answer combos produce different results.
// ─────────────────────────────────────────
function mockAnalysis() {
  const scores = [0, 0, 0, 0, 0];
  for (const [qid, map] of Object.entries(WEIGHTS)) {
    const ans = answers[qid];
    if (ans !== undefined) scores[map[ans]]++;
  }
  return ARCHETYPES[scores.indexOf(Math.max(...scores))];
}

// ─────────────────────────────────────────
//  DISPLAY RESULTS
// ─────────────────────────────────────────
function displayResults(r) {
  document.getElementById("result-icon").textContent    = r.icon;
  document.getElementById("result-name").textContent    = r.name;
  document.getElementById("result-tagline").textContent = r.tagline;

  document.getElementById("traits-grid").innerHTML = r.traits.map(t => `
    <div class="trait-chip">
      <div class="trait-label">${t.label}</div>
      <div class="trait-value">${t.value}</div>
    </div>`).join("");

  document.getElementById("profile-text").textContent = r.profile;

  document.getElementById("compat-list").innerHTML = r.matches.map(m => `
    <div class="compat-item">
      <div class="compat-icon">${m.icon}</div>
      <div class="compat-info">
        <div class="compat-name">${m.name}</div>
        <div class="compat-desc">${m.desc}</div>
      </div>
      <div class="compat-score">${m.score}</div>
    </div>`).join("");

  showScreen("results-screen");
}

// ─────────────────────────────────────────
//  UTILITIES
// ─────────────────────────────────────────
function restartQuiz() { showScreen("start-screen"); }

function shareResult() {
  const name    = document.getElementById("result-name").textContent;
  const tagline = document.getElementById("result-tagline").textContent;
  const text    = `My Virel type: ${name}\n"${tagline}"\n\nFind out yours →`;
  if (navigator.share) {
    navigator.share({ title: "Virel", text });
  } else if (navigator.clipboard) {
    navigator.clipboard.writeText(text).then(() => alert("Copied! Paste it anywhere."));
  } else {
    alert(text);
  }
}
