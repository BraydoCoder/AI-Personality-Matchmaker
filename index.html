<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />

  <style>

    }

    }

      color: #a0aec0;

    }

    .api-row {

      gap: 10px;
    }

    .api-section input {

      border: 1px solid rgba(255,255,255,0.2);

    }

    .mock-badge {

    }

    .btn {
      display: inline-block;
      padding: 14px 36px;
      border-radius: 50px;
      border: none;
      cursor: pointer;
      font-size: 1rem;
      font-weight: 600;
      transition: transform 0.15s, box-shadow 0.15s;
    }

    .btn:active { transform: scale(0.97); }

    .btn-primary {
      background: linear-gradient(135deg, #7c3aed, #2563eb);
      color: #fff;
      box-shadow: 0 4px 20px rgba(124, 58, 237, 0.5);
    }

    /* ── QUIZ SCREEN ── */

      margin-top: 28px;

      border: 4px solid rgba(255,255,255,0.1);
      border-top-color: #a78bfa;

    }

    /* ── RESULTS SCREEN ── */

      color: #a0aec0;

      justify-content: center;

// ─────────────────────────────────────────
//  STATE
// ─────────────────────────────────────────
let currentQ = 0;
let answers = {};
const apiKey = "__OPENROUTER_API_KEY__";

// ─────────────────────────────────────────
//  SCREEN HELPERS
// ─────────────────────────────────────────
function showScreen(id) {
  ["start-screen","quiz-screen","loading-screen","results-screen"].forEach(s => {
    document.getElementById(s).style.display = "none";
  });
  document.getElementById(id).style.display = "block";
}

// ─────────────────────────────────────────
//  QUIZ LOGIC
// ─────────────────────────────────────────
function startQuiz() {
  currentQ = 0;
  answers = {};
  showScreen("quiz-screen");
  renderQuestion();
}

function renderQuestion() {
  const q = QUESTIONS[currentQ];
  const total = QUESTIONS.length;

  document.getElementById("progress-bar").style.width = `${((currentQ) / total) * 100}%`;
  document.getElementById("question-label").textContent = `Question ${currentQ + 1} of ${total}`;
  document.getElementById("question-text").textContent = q.text;
  document.getElementById("next-btn").textContent = currentQ === total - 1 ? "See My Results ✨" : "Next →";

  const area = document.getElementById("answer-area");
  area.innerHTML = "";

  if (q.type === "choice") {
    const div = document.createElement("div");
    div.className = "choices";
    q.choices.forEach((c, i) => {
      const btn = document.createElement("button");
      btn.className = "choice-btn";
      if (answers[q.id] === i) btn.classList.add("selected");
      btn.textContent = c;
      btn.onclick = () => {
        document.querySelectorAll(".choice-btn").forEach(b => b.classList.remove("selected"));
        btn.classList.add("selected");
        answers[q.id] = i;
      };
      div.appendChild(btn);
    });
    area.appendChild(div);
  } else {
    const ta = document.createElement("textarea");
    ta.className = "open-input";
    ta.placeholder = q.placeholder || "Type your answer…";
    ta.value = answers[q.id] || "";
    ta.oninput = () => { answers[q.id] = ta.value; };
    area.appendChild(ta);
  }
}

function nextQuestion() {
  const q = QUESTIONS[currentQ];

  // Validate
  if (q.type === "choice" && answers[q.id] === undefined) {
    alert("Please pick an option before continuing.");
    return;
  }
  if (q.type === "open" && !answers[q.id]?.trim()) {
    alert("Please write a quick answer before continuing.");
    return;
  }

  if (currentQ < QUESTIONS.length - 1) {
    currentQ++;
    renderQuestion();
  } else {
    analyseAnswers();
  }
}

// ─────────────────────────────────────────
//  ANALYSIS
// ─────────────────────────────────────────
async function analyseAnswers() {
  showScreen("loading-screen");

  const loadingMessages = [
    "Analysing your personality…",
    "Consulting the AI oracle…",
    "Mapping your cognitive fingerprint…",
    "Calculating compatibility scores…",
    "Almost there…"
  ];
  let mi = 0;
  const lt = document.getElementById("loading-text");
  const interval = setInterval(() => {
    mi = (mi + 1) % loadingMessages.length;
    lt.textContent = loadingMessages[mi];
  }, 1200);

  let result;
  try {
    if (apiKey) {
      result = await callOpenRouter();
    } else {
      await sleep(3000);
      result = mockAnalysis();
    }
  } catch(e) {
    console.warn("API error, falling back to mock:", e);
    result = mockAnalysis();
  }

  clearInterval(interval);
  displayResults(result);
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

// ─────────────────────────────────────────
//  OPENROUTER CALL
// ─────────────────────────────────────────
async function callOpenRouter() {
  const summary = QUESTIONS.map((q, i) => {
    let ans = answers[q.id];
    if (q.type === "choice") ans = q.choices[ans] || "no answer";
    return `Q${i+1}: ${q.text}\nAnswer: ${ans}`;
  }).join("\n\n");

  const systemPrompt = `You are an AI Personality Matchmaker. Analyse the user's quiz answers and return a JSON object describing their personality type.

Return ONLY valid JSON with this exact structure (no markdown, no explanation):
{
  "name": "The [Personality Type]",
  "icon": "[single emoji]",
  "tagline": "[short punchy tagline under 10 words]",
  "traits": [
    {"label": "Curiosity", "value": "[1-3 word descriptor]"},
    {"label": "Style", "value": "[1-3 word descriptor]"},
    {"label": "Energy", "value": "[1-3 word descriptor]"},
    {"label": "Strength", "value": "[1-3 word descriptor]"}
  ],
  "profile": "[2-3 sentences describing their personality warmly and specifically]",
  "matches": [
    {"icon": "[emoji]", "name": "[AI name]", "desc": "[why they match, under 8 words]", "score": "[XX%]"},
    {"icon": "[emoji]", "name": "[AI name]", "desc": "[why they match, under 8 words]", "score": "[XX%]"},
    {"icon": "[emoji]", "name": "[AI name]", "desc": "[why they match, under 8 words]", "score": "[XX%]"}
  ]
}`;

  const resp = await fetch("https://openrouter.ai/api/v1/chat/completions", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "Authorization": `Bearer ${apiKey}`,
      "HTTP-Referer": window.location.href,
      "X-Title": "AI Personality Matchmaker"
    },
    body: JSON.stringify({
      model: "openai/gpt-4o-mini",
      messages: [
        { role: "system", content: systemPrompt },
        { role: "user", content: summary }
      ],
      temperature: 0.85
    })
  });

  if (!resp.ok) throw new Error(`API ${resp.status}`);
  const data = await resp.json();
  const raw = data.choices[0].message.content;
  return JSON.parse(raw);
}

  const scores = [0, 0, 0, 0, 0]; // deep, empathetic, innovator, strategist, creator

  const weights = {
    q1: [0,1,4,3,2], // free afternoon
    q2: [0,2,1,3,2], // hard decision
    q3: [0,3,4,1,3], // favourite question
    q4: [0,1,4,3,2], // group role
    q5: [2,1,3,0,4], // uncertainty
    q6: [0,3,2,3,1]  // mistakes
  };

  for (const [qid, ws] of Object.entries(weights)) {
    const ans = answers[qid];
    if (ans !== undefined && ws[ans] !== undefined) {
      scores[ws[ans]]++;
    }
  }

  // Open question keyword nudges
  const openAns = (answers["q7"] || "").toLowerCase();
  if (/deep|philosoph|meaning|exist/.test(openAns)) scores[0] += 2;
  if (/connect|feel|heart|friend|empath/.test(openAns)) scores[1] += 2;
  if (/fast|spontan|fun|wild|energy/.test(openAns)) scores[2] += 2;
  if (/plan|goal|focus|logic|strateg/.test(openAns)) scores[3] += 2;
  if (/creat|art|music|write|story|imagine/.test(openAns)) scores[4] += 2;

  const best = scores.indexOf(Math.max(...scores));
  return ARCHETYPES[best];
}

// ─────────────────────────────────────────
//  DISPLAY RESULTS
// ─────────────────────────────────────────
function displayResults(r) {
  document.getElementById("result-icon").textContent = r.icon;
  document.getElementById("result-name").textContent = r.name;
  document.getElementById("result-tagline").textContent = r.tagline;

  const tg = document.getElementById("traits-grid");
  tg.innerHTML = r.traits.map(t => `
    <div class="trait-chip">
      <div class="trait-label">${t.label}</div>
      <div class="trait-value">${t.value}</div>
    </div>
  `).join("");

  document.getElementById("profile-text").textContent = r.profile;

  const cl = document.getElementById("compat-list");
  cl.innerHTML = r.matches.map(m => `
    <div class="compat-item">
      <div class="compat-icon">${m.icon}</div>
      <div class="compat-info">
        <div class="compat-name">${m.name}</div>
        <div class="compat-desc">${m.desc}</div>
      </div>
      <div class="compat-score">${m.score}</div>
    </div>
  `).join("");

  showScreen("results-screen");
}

// ─────────────────────────────────────────
//  UTILITIES
// ─────────────────────────────────────────
function restartQuiz() {
  showScreen("start-screen");
}

function shareResult() {
  const name = document.getElementById("result-name").textContent;
  const text = `I just took the AI Personality Matchmaker quiz and I'm "${name}"! 🤖✨`;
  if (navigator.share) {
    navigator.share({ title: "AI Personality Matchmaker", text });
  } else if (navigator.clipboard) {
    navigator.clipboard.writeText(text).then(() => alert("Result copied to clipboard!"));
  } else {
    alert(text);
  }
}
